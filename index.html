<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name — Photography</title>
  <meta name="description" content="A photography portfolio.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..500&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <!-- ===== Heading ===== -->
  <header class="site-head">
    <h1>Your Name</h1>
    <p>A collection of photographs — portraits, streets, and landscapes.</p>
  </header>

  <!-- ===== Filter toggle + panel ===== -->
 <button class="filter-toggle" id="filter-toggle">Filters</button>
<aside class="filter-panel" id="filter-panel">
  <div class="filter-panel__head">
    <h2>Filter by tag</h2>
    <button class="filter-panel__close" id="filter-close" aria-label="Close filters">&times;</button>
  </div>
    <div class="tag-cloud" id="tag-cloud"><!-- built by JS from each photo's data-tags --></div>
    <button class="filter-clear" id="filter-clear">Clear filters</button>
  </aside>

  <!-- ===== Photo grid =====
       To add a photo: copy one <figure> block, change the image src
       and data-tags (comma-separated — these become the filter tags). -->
  <main class="grid" id="grid">
    
    <figure class="photo" data-tags="lake, forest, new delhi, india, summer, water">
  <img src="assets/images/sanjaylake.jpg" data-full="assets/images/sanjaylake.jpg" alt="Sanjay Van, a reserved forest in South of New Delhi, India. June 2020.">
  <figcaption class="photo__tags">lake · forest · new delhi · india</figcaption>
</figure>

    <figure class="photo" data-tags="landscape, coast, color">
      <img src="https://picsum.photos/seed/wo-harbor/900/900" data-full="https://picsum.photos/seed/wo-harbor/1800/1800" alt="Harbor Light">
      <figcaption class="photo__tags">landscape · coast · color</figcaption>
    </figure>

    <figure class="photo" data-tags="portrait, street, black-and-white">
      <img src="https://picsum.photos/seed/wo-corner-booth/900/900" data-full="https://picsum.photos/seed/wo-corner-booth/1800/1800" alt="Corner Booth">
      <figcaption class="photo__tags">portrait · street · black-and-white</figcaption>
    </figure>

    <figure class="photo" data-tags="street, night, color">
      <img src="https://picsum.photos/seed/wo-crosswalk/900/900" data-full="https://picsum.photos/seed/wo-crosswalk/1800/1800" alt="Crosswalk, 5PM">
      <figcaption class="photo__tags">street · night · color</figcaption>
    </figure>

    <figure class="photo" data-tags="film, travel, color">
      <img src="https://picsum.photos/seed/wo-kodak-gold/900/900" data-full="https://picsum.photos/seed/wo-kodak-gold/1800/1800" alt="Kodak Gold Afternoon">
      <figcaption class="photo__tags">film · travel · color</figcaption>
    </figure>

    <figure class="photo" data-tags="street, black-and-white">
      <img src="https://picsum.photos/seed/wo-fire-escape/900/900" data-full="https://picsum.photos/seed/wo-fire-escape/1800/1800" alt="Fire Escape">
      <figcaption class="photo__tags">street · black-and-white</figcaption>
    </figure>

    <figure class="photo" data-tags="landscape, travel, color">
      <img src="https://picsum.photos/seed/wo-ridge-line/900/900" data-full="https://picsum.photos/seed/wo-ridge-line/1800/1800" alt="Ridge Line">
      <figcaption class="photo__tags">landscape · travel · color</figcaption>
    </figure>

    <figure class="photo" data-tags="portrait, travel, black-and-white">
      <img src="https://picsum.photos/seed/wo-waiting-room/900/900" data-full="https://picsum.photos/seed/wo-waiting-room/1800/1800" alt="Waiting Room">
      <figcaption class="photo__tags">portrait · travel · black-and-white</figcaption>
    </figure>

    <figure class="photo" data-tags="film, landscape, color">
      <img src="https://picsum.photos/seed/wo-portra-sunset/900/900" data-full="https://picsum.photos/seed/wo-portra-sunset/1800/1800" alt="Portra Sunset">
      <figcaption class="photo__tags">film · landscape · color</figcaption>
    </figure>

    <figure class="photo" data-tags="street, night, travel">
      <img src="https://picsum.photos/seed/wo-night-vendor/900/900" data-full="https://picsum.photos/seed/wo-night-vendor/1800/1800" alt="Night Vendor">
      <figcaption class="photo__tags">street · night · travel</figcaption>
    </figure>

    <figure class="photo" data-tags="landscape, travel, color">
      <img src="https://picsum.photos/seed/wo-terraces/900/900" data-full="https://picsum.photos/seed/wo-terraces/1800/1800" alt="Terraces">
      <figcaption class="photo__tags">landscape · travel · color</figcaption>
    </figure>

    <figure class="photo" data-tags="portrait, black-and-white">
      <img src="https://picsum.photos/seed/wo-portrait-2/900/900" data-full="https://picsum.photos/seed/wo-portrait-2/1800/1800" alt="Portrait">
      <figcaption class="photo__tags">portrait · black-and-white</figcaption>
    </figure>

    <figure class="photo" data-tags="street, color">
      <img src="https://picsum.photos/seed/wo-street-2/900/900" data-full="https://picsum.photos/seed/wo-street-2/1800/1800" alt="Street scene">
      <figcaption class="photo__tags">street · color</figcaption>
    </figure>

  </main>

  <!-- ===== Lightbox ===== -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox__close" id="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox__prev" id="lightbox-prev" aria-label="Previous">&#8249;</button>
    <button class="lightbox__next" id="lightbox-next" aria-label="Next">&#8250;</button>
    <div class="lightbox__img-wrap">
      <img id="lightbox-img" src="" alt="">
      <div class="lightbox__caption" id="lightbox-caption"></div>
      <div class="lightbox__tags" id="lightbox-tags"></div>
    </div>
  </div>

  <!-- ===== Footer ===== -->
  <footer class="site">
    &copy; <span id="year"></span> Your Name. All rights reserved. &nbsp;·&nbsp;
    <a href="mailto:you@example.com">you@example.com</a>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="assets/js/main.js"></script>
</body>
</html>
